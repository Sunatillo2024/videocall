<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexCall — Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/room.css" />
</head>
<body>
  <div class="noise"></div>

  <!-- Header -->
  <header class="room-header">
    <a href="/" class="logo">NEX<span class="accent">CALL</span></a>
    <div class="room-info">
      <span class="room-label">ROOM</span>
      <span class="room-id" id="roomIdDisplay">—</span>
      <button class="copy-btn" onclick="copyRoomId()" title="Copy room ID">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
      </button>
    </div>
    <div class="conn-status" id="connStatus">
      <span class="dot dot--waiting"></span>
      <span id="connLabel">Waiting...</span>
    </div>
  </header>

  <!-- Status Banner -->
  <div class="status-banner" id="statusBanner">
    <div class="spinner"></div>
    <span id="statusText">Connecting to room...</span>
  </div>

  <!-- Video Grid -->
  <main class="video-grid" id="videoGrid">
    <div class="video-tile" id="localTile">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="tile-label">
        <span class="tile-dot tile-dot--local"></span>
        YOU
      </div>
      <div class="tile-overlay" id="localOverlay">
        <div class="cam-off-icon">📷</div>
        <div>Camera off</div>
      </div>
    </div>

    <div class="video-tile video-tile--remote" id="remoteTile">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="tile-label">
        <span class="tile-dot tile-dot--remote"></span>
        <span id="remoteName">PEER</span>
      </div>
      <div class="tile-overlay tile-overlay--waiting" id="remoteOverlay">
        <div class="waiting-anim">
          <div class="pulse-ring"></div>
          <div class="pulse-core">👤</div>
        </div>
        <div>Waiting for peer...</div>
      </div>
    </div>
  </main>

  <!-- Controls -->
  <footer class="controls">
    <button class="ctrl-btn" id="btnMic" onclick="app.toggleMic()" title="Toggle microphone">
      <svg class="icon-mic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
      </svg>
      <svg class="icon-mic-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
        <path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23M12 19v4M8 23h8"/>
      </svg>
      <span class="ctrl-label">Mic</span>
    </button>

    <button class="ctrl-btn" id="btnCam" onclick="app.toggleCam()" title="Toggle camera">
      <svg class="icon-cam" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <svg class="icon-cam-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 16v1a2 2 0 01-2 2H3a2 2 0 01-2-2V7a2 2 0 012-2h2m5.66 0H14a2 2 0 012 2v3.34l1 1L23 7v10"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
      <span class="ctrl-label">Camera</span>
    </button>

    <button class="ctrl-btn ctrl-btn--end" onclick="app.endCall()" title="End call">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
      </svg>
      <span class="ctrl-label">End</span>
    </button>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/static/js/websocket.js"></script>
  <script src="/static/js/webrtc.js"></script>
  <script src="/static/js/ui.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
