<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexCall — Video Calls, Reimagined</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>

  <header class="header">
    <div class="logo">NEX<span class="accent">CALL</span></div>
    <div class="status-pill">● LIVE</div>
  </header>

  <main class="hero">
    <div class="hero-tag">WebRTC · P2P · Encrypted</div>
    <h1 class="hero-title">
      Video calls<br/>
      <span class="stroke-text">without limits</span>
    </h1>
    <p class="hero-sub">Peer-to-peer. No servers in the middle. Just you and them.</p>

    <div class="card">
      <div class="card-label">START OR JOIN A ROOM</div>
      <div class="input-row">
        <input
          id="roomInput"
          class="room-input"
          type="text"
          placeholder="room-id or leave blank..."
          spellcheck="false"
        />
        <button class="btn-join" onclick="joinRoom()">
          <span>JOIN</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="card-hint">Share the room ID with your peer to connect</div>
    </div>

    <div class="features">
      <div class="feat">
        <div class="feat-icon">⚡</div>
        <div>WebRTC P2P</div>
      </div>
      <div class="feat">
        <div class="feat-icon">🔒</div>
        <div>E2E Encrypted</div>
      </div>
      <div class="feat">
        <div class="feat-icon">🎥</div>
        <div>HD Video</div>
      </div>
    </div>
  </main>

  <script>
    function generateId() {
      return Math.random().toString(36).substring(2, 8);
    }

    function joinRoom() {
      const input = document.getElementById('roomInput');
      const roomId = input.value.trim() || generateId();
      window.location.href = `/room/${roomId}`;
    }

    document.getElementById('roomInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinRoom();
    });
  </script>
</body>
</html>
