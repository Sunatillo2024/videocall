# coturn configuration for NexCall

# Listening port
listening-port=3478

# TLS port (optional for local dev)
# tls-listening-port=5349

# Relay ports range
min-port=49152
max-port=65535

# Public IP (for local dev, use 127.0.0.1)
# In production, set this to your server's public IP
listening-ip=0.0.0.0

# Realm
realm=nexcall.local

# Authentication
user=nexcall:nexcall123

# Log file
log-file=/var/log/coturn/turn.log
verbose

# No TLS for local development
no-tls
no-dtls

# Fingerprint
fingerprint

# Long-term credentials
lt-cred-mech
